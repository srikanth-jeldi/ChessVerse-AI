apiVersion: v1
kind: ServiceAccount
metadata:
  name: chessverse-backend
  namespace: chessverse
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chessverse-backend
  namespace: chessverse
spec:
  # Keep one replica until the auth limiter is moved to Redis.
  replicas: 1
  selector:
    matchLabels:
      app: chessverse-backend
  template:
    metadata:
      labels:
        app: chessverse-backend
    spec:
      serviceAccountName: chessverse-backend
      containers:
        - name: backend
          image: ghcr.io/srikanth-jeldi/chessverse-ai/backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: prod
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: chessverse-backend-secret
                  key: db-url
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: chessverse-backend-secret
                  key: db-username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: chessverse-backend-secret
                  key: db-password
            - name: MAIL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: chessverse-backend-secret
                  key: mail-username
            - name: MAIL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: chessverse-backend-secret
                  key: mail-password
            - name: MAIL_FROM
              valueFrom:
                secretKeyRef:
                  name: chessverse-backend-secret
                  key: mail-from
            - name: ALLOWED_ORIGIN_PATTERNS
              valueFrom:
                secretKeyRef:
                  name: chessverse-backend-secret
                  key: allowed-origin-patterns
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 45
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: chessverse-backend
  namespace: chessverse
spec:
  type: ClusterIP
  selector:
    app: chessverse-backend
  ports:
    - name: http
      port: 80
      targetPort: 8080
