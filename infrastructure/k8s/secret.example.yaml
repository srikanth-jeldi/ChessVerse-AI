apiVersion: v1
kind: Secret
metadata:
  name: chessverse-backend-secret
  namespace: chessverse
type: Opaque
stringData:
  db-url: jdbc:postgresql://replace-with-rds-endpoint:5432/chessverse
  db-username: chessverse
  db-password: replace-me
  # Leave these blank for SNS sandbox/international-route testing.
  # Set approved TRAI/DLT values for India local-route production SMS.
  sms-sender-id: ""
  sms-india-entity-id: ""
  sms-india-template-id: ""
