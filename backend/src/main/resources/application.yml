spring:
  application:
    name: chessverse-ai-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/chessverse}
    username: ${DB_USERNAME:chessverse}
    password: ${DB_PASSWORD:chessverse}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

chessverse:
  engine:
    stockfish-path: ${STOCKFISH_PATH:stockfish}
    response-timeout-seconds: ${STOCKFISH_TIMEOUT_SECONDS:5}
  auth:
    otp-expiry-minutes: ${OTP_EXPIRY_MINUTES:10}
    session-expiry-days: ${SESSION_EXPIRY_DAYS:30}
    mail-from: ${MAIL_FROM:${MAIL_USERNAME:}}
    sms:
      mode: ${SMS_MODE:gateway}
      expose-development-code: false
      gateway-url: ${SMS_GATEWAY_URL:}
      gateway-token: ${SMS_GATEWAY_TOKEN:}
      sender: ${SMS_SENDER:ChessVerse}
      aws-region: ${AWS_REGION:ap-south-1}
      sender-id: ${SMS_SENDER_ID:}
      max-price: ${SMS_MAX_PRICE:}
      india-entity-id: ${SMS_INDIA_ENTITY_ID:}
      india-template-id: ${SMS_INDIA_TEMPLATE_ID:}
    oauth:
      google-client-ids: ${GOOGLE_CLIENT_IDS:${GOOGLE_WEB_CLIENT_ID:}}
      apple-client-ids: ${APPLE_CLIENT_IDS:${APPLE_SERVICE_ID:}}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

server:
  port: ${PORT:8080}
