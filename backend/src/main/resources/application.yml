spring:
  application:
    name: chessverse-ai-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/chessverse}
    username: ${DB_USERNAME:chessverse}
    password: ${DB_PASSWORD:chessverse}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

chessverse:
  auth:
    otp-expiry-minutes: ${OTP_EXPIRY_MINUTES:10}
    session-expiry-days: ${SESSION_EXPIRY_DAYS:30}
    mail-from: ${MAIL_FROM:${MAIL_USERNAME:}}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

server:
  port: ${PORT:8080}
