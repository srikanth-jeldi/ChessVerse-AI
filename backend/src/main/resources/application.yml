spring:
  application:
    name: chessverse-ai-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:chessverse}}
    username: ${DB_USERNAME:chessverse}
    password: ${DB_PASSWORD:chessverse}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

chessverse:
  engine:
    stockfish-path: ${STOCKFISH_PATH:stockfish}
    response-timeout-seconds: ${STOCKFISH_TIMEOUT_SECONDS:5}
  auth:
    otp-expiry-minutes: ${OTP_EXPIRY_MINUTES:10}
    session-expiry-days: ${SESSION_EXPIRY_DAYS:30}
    resend-cooldown-seconds: ${AUTH_RESEND_COOLDOWN_SECONDS:60}
    login-lockout-minutes: ${AUTH_LOGIN_LOCKOUT_MINUTES:15}
    rate-limit:
      enabled: ${AUTH_RATE_LIMIT_ENABLED:true}
    mail-from: ${MAIL_FROM:${MAIL_USERNAME:}}
  web:
    allowed-origin-patterns: ${ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

server:
  port: ${PORT:8080}
