name: chessverse_ai
description: Cross-platform ChessVerse AI application.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  audioplayers: ^6.8.0
  flutter:
    sdk: flutter
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.8

flutter:
  uses-material-design: true
  assets:
    - assets/audio/
    - assets/backgrounds/
    - assets/pieces/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/branding/app_icon.png
  adaptive_icon_background: "#071B33"
  adaptive_icon_foreground: assets/branding/app_icon.png
  adaptive_icon_foreground_inset: 12
  remove_alpha_ios: true
  web:
    generate: true
    image_path: assets/branding/app_icon.png
    background_color: "#071B33"
    theme_color: "#071B33"
  windows:
    generate: true
    image_path: assets/branding/app_icon.png
    icon_size: 256
  macos:
    generate: true
    image_path: assets/branding/app_icon.png

flutter_native_splash:
  color: "#F7F7F7"
  image: assets/branding/splash_brand.png
  android: true
  ios: true
  web: true
  fullscreen: true
  ios_content_mode: scaleAspectFit
  web_image_mode: center
  android_12:
    color: "#071B33"
    image: assets/branding/app_icon.png
    icon_background_color: "#071B33"
