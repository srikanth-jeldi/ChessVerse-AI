name: chessverse_ai
description: Cross-platform ChessVerse AI application.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  audioplayers: ^6.8.0
  flutter:
    sdk: flutter
  google_sign_in: ^7.2.0
  google_sign_in_web: ^1.1.3
  http: ^1.2.2
  sign_in_with_apple: ^8.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/audio/
    - assets/backgrounds/
    - assets/pieces/
