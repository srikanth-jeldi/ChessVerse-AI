name: chessverse_ai
description: Cross-platform ChessVerse AI application.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  audioplayers: ^6.8.0
  flutter:
    sdk: flutter
  flutter_secure_storage: ^10.3.1
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.8

flutter:
  uses-material-design: true
  assets:
    - assets/audio/
    - assets/backgrounds/
    - assets/branding/
    - assets/pieces/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/branding/app_icon.png
  adaptive_icon_background: "#071B33"
  adaptive_icon_foreground: assets/branding/app_icon.png
  adaptive_icon_foreground_inset: 12
  remove_alpha_ios: true

flutter_native_splash:
  color: "#02070D"
  background_image: assets/branding/splash_screen_mobile.png
  android: true
  ios: true
  fullscreen: true
  ios_content_mode: scaleAspectFit
  android_12:
    color: "#02070D"
    image: assets/branding/transparent_splash_icon.png
    icon_background_color: "#02070D"
